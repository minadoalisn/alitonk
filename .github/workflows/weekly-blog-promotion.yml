name: Daily Main-Site Blog Promotion

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate promotion article
        run: npm run blog:promotion
        env:
          BLOG_BASE_URL: https://minadoai.com

      - name: Commit generated article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/blog/news/*.html public/blog/news.html public/blog/sitemap.xml
          git diff --cached --quiet || git commit -m "Publish daily blog promotion"
          git push
